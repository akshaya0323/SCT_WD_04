<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy To-Do</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="stars"></div>
<div class="twinkling"></div>

<div class="container">
    <div class="header">
        <h1>To-Do List</h1>
        <p>Organize your tasks</p>
    </div>

    <div class="add-task-section">
        <input type="text" id="taskInput" placeholder="Enter your mission..." maxlength="200">

        <div class="datetime-group">
            <input type="date" id="taskDate">
            <input type="time" id="taskTime">
        </div>

        <button onclick="addTask()">➕ Add Task</button>
    </div>

    <div class="stats">
        <div>
            <h2 id="totalTasks">0</h2>
            <p>Total</p>
        </div>
        <div>
            <h2 id="completedTasks">0</h2>
            <p>Done</p>
        </div>
        <div>
            <h2 id="pendingTasks">0</h2>
            <p>Pending</p>
        </div>
    </div>

    <div class="filter-buttons">
        <button onclick="filterTasks('all')" class="active">All</button>
        <button onclick="filterTasks('pending')">Pending</button>
        <button onclick="filterTasks('completed')">Done</button>
        <button onclick="filterTasks('today')">Today</button>
        <button onclick="filterTasks('overdue')">Overdue</button>
    </div>

    <div id="tasksList" class="tasks-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
